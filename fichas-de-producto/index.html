<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas de Producto — TheNucleo</title>
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Fichas de servicios TheNucleo. Editable solo por equipo interno.">

<!-- Anti-flicker: empezamos en modo bloqueo. El módulo JS lo retira si detecta admin. -->
<script>
(function () {
  document.documentElement.classList.add('locked-mode');
})();
</script>

<style>
@font-face { font-family:'NewBlack'; src:url('/fonts/NewBlackTypeface-Light.woff2') format('woff2'); font-weight:300; font-display:swap; }
@font-face { font-family:'NewBlack'; src:url('/fonts/NewBlackTypeface-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
@font-face { font-family:'NewBlack'; src:url('/fonts/NewBlackTypeface-Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
@font-face { font-family:'NewBlack'; src:url('/fonts/NewBlackTypeface-SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
@font-face { font-family:'NewBlack'; src:url('/fonts/NewBlackTypeface-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }

:root {
  --bg-base:#090a0f; --bg-card:#12141b; --bg-elevated:#1a1d27;
  --bg-hover:#1e2130; --bg-active:#252836;
  --border-subtle:#1e2130; --border-default:#2a2d3e; --border-strong:#363a4e;
  --text-primary:#edeef3; --text-secondary:#8b8fa8; --text-tertiary:#5c6078; --text-inverse:#090a0f;
  --accent-primary:#22c55e; --accent-primary-hover:#16a34a; --accent-primary-muted:rgba(34,197,94,0.12);
  --accent-secondary:#3b82f6; --accent-secondary-hover:#2563eb; --accent-secondary-muted:rgba(59,130,246,0.12);
  --status-success:#22c55e; --status-success-bg:rgba(34,197,94,0.10);
  --status-warning:#f59e0b; --status-warning-bg:rgba(245,158,11,0.10);
  --status-error:#ef4444;   --status-error-bg:rgba(239,68,68,0.10);
  --status-info:#3b82f6;    --status-info-bg:rgba(59,130,246,0.10);
  --status-neutral:#6b7280; --status-neutral-bg:rgba(107,114,128,0.10);
  --status-violet:#8b5cf6;  --status-violet-bg:rgba(139,92,246,0.10);
  --font-ui:'NewBlack',sans-serif;
  --radius-sm:6px; --radius-md:8px; --radius-lg:12px; --radius-xl:16px;
  --ease-out:cubic-bezier(0.16,1,0.3,1); --duration-fast:150ms; --duration-base:200ms; --duration-slow:300ms;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html.locked-mode .app { visibility:hidden; }
html.locked-mode .gate { display:flex !important; }

body {
  font-family:var(--font-ui); background:var(--bg-base); color:var(--text-primary);
  font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased;
}
a { color:inherit; text-decoration:none; }
button { font-family:inherit; }

/* ============================================
   GATE (vista bloqueada para anon / no-admin)
   ============================================ */
.gate {
  display:none; position:fixed; inset:0; z-index:1000;
  background:var(--bg-base); align-items:center; justify-content:center;
  flex-direction:column; gap:20px; padding:32px; text-align:center;
}
.gate-icon { font-size:56px; opacity:.5; }
.gate h1 { font-size:22px; font-weight:600; margin:0; }
.gate p { color:var(--text-secondary); max-width:480px; line-height:1.55; }
.gate-actions { display:flex; gap:10px; margin-top:10px; }
.gate .btn-primary {
  background:var(--accent-primary); color:var(--text-inverse);
  border:none; padding:10px 18px; border-radius:var(--radius-md);
  font-weight:600; cursor:pointer; font-size:13px;
}
.gate .btn-primary:hover { background:var(--accent-primary-hover); }
.gate .btn-ghost {
  background:transparent; color:var(--text-secondary);
  border:1px solid var(--border-default); padding:10px 18px;
  border-radius:var(--radius-md); cursor:pointer; font-size:13px;
}

/* ============================================
   LAYOUT
   ============================================ */
.app { min-height:100vh; }
.topbar {
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px clamp(14px, 4vw, 40px);
  background:rgba(9,10,15,0.85); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-subtle);
}
.topbar-left { display:flex; align-items:center; gap:14px; }
.topbar h1 {
  font-size:16px; font-weight:600; letter-spacing:-0.01em;
  display:flex; align-items:center; gap:10px;
}
.topbar h1 .dot { width:8px; height:8px; border-radius:50%; background:var(--accent-primary); box-shadow:0 0 12px var(--accent-primary); }
.topbar-right { display:flex; align-items:center; gap:10px; }

.save-indicator {
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; color:var(--text-tertiary);
  padding:4px 10px; border-radius:999px;
  background:transparent; transition:all var(--duration-base);
}
.save-indicator.saving { color:var(--status-warning); background:var(--status-warning-bg); }
.save-indicator.saved  { color:var(--status-success); background:var(--status-success-bg); }
.save-indicator.error  { color:var(--status-error);   background:var(--status-error-bg); }
.save-indicator .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.save-indicator.saving .dot { animation:dotPulse 1s infinite; }
@keyframes dotPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.5} }

.user-pill {
  display:inline-flex; align-items:center; gap:8px;
  font-size:12px; color:var(--text-secondary);
  padding:6px 12px; border-radius:999px;
  border:1px solid var(--border-default);
}
.user-pill .avatar {
  width:22px; height:22px; border-radius:50%;
  background:var(--accent-primary); color:var(--text-inverse);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600;
}
.btn-logout {
  background:transparent; color:var(--text-tertiary);
  border:1px solid var(--border-default);
  padding:6px 12px; border-radius:999px;
  cursor:pointer; font-size:11px;
}
.btn-logout:hover { color:var(--text-primary); border-color:var(--border-strong); }

.nav-user-wrap { position:relative; }
.nav-user-btn {
  width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center;
  background:transparent; color:var(--text-secondary);
  border:1px solid var(--border-default); border-radius:var(--radius-sm);
  cursor:pointer; transition:all 120ms;
}
.nav-user-btn:hover { color:var(--text-primary); border-color:var(--border-strong); background:var(--bg-hover); }
.nav-user-dropdown {
  position:absolute; top:calc(100% + 8px); right:0; z-index:300;
  background:var(--bg-elevated); border:1px solid var(--border-default);
  border-radius:var(--radius-md); padding:6px;
  box-shadow:0 12px 32px rgba(0,0,0,0.45);
  min-width:190px;
  animation:navPopIn 120ms cubic-bezier(0.16,1,0.3,1);
}
@keyframes navPopIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.nav-user-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:var(--radius-sm);
  font-size:13px; font-weight:500; color:var(--text-primary);
  text-decoration:none; transition:background 120ms;
}
.nav-user-item:hover { background:var(--bg-hover); }
.nav-user-item svg { width:15px; height:15px; color:var(--text-tertiary); flex-shrink:0; }
.nav-user-item.nav-active { color:var(--accent-primary); }
.nav-user-item.nav-active svg { color:var(--accent-primary); }
.nav-user-divider { height:1px; background:var(--border-subtle); margin:4px 0; }

.layout {
  display:grid; grid-template-columns:240px 1fr;
  gap:24px; padding:24px clamp(14px, 4vw, 40px);
  max-width:1400px; margin:0 auto;
}
@media (max-width:900px) { .layout { grid-template-columns:1fr; } .sidebar { position:static !important; } }

.sidebar {
  position:sticky; top:84px; align-self:flex-start;
  background:var(--bg-card); border:1px solid var(--border-subtle);
  border-radius:var(--radius-lg); padding:14px;
  max-height:calc(100vh - 110px); overflow:auto;
}
.sidebar-title {
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.08em; color:var(--text-tertiary);
  padding:4px 8px 10px;
}
.cat-link {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; border-radius:var(--radius-sm);
  font-size:13px; color:var(--text-secondary);
  cursor:pointer; transition:all var(--duration-fast);
  border:1px solid transparent;
}
.cat-link:hover { color:var(--text-primary); background:var(--bg-hover); }
.cat-link.active { color:var(--text-primary); background:var(--bg-active); border-color:var(--border-default); }
.cat-link .cat-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.cat-link .cat-name { flex:1; margin-left:8px; font-weight:500; }
.cat-link .cat-count {
  font-size:11px; color:var(--text-tertiary);
  background:var(--bg-elevated); padding:2px 7px; border-radius:999px;
}

.main { min-width:0; }

.category-block {
  margin-bottom:36px; scroll-margin-top:90px;
}
.category-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; padding-bottom:14px;
  border-bottom:1px solid var(--border-subtle);
}
.category-header-left { display:flex; align-items:center; gap:12px; }
.category-bar { width:4px; height:24px; border-radius:2px; }
.category-header h2 { font-size:18px; font-weight:600; letter-spacing:-0.01em; }
.btn-add {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--accent-primary-muted); color:var(--accent-primary);
  border:1px solid var(--accent-primary-muted);
  padding:6px 12px; border-radius:var(--radius-sm);
  cursor:pointer; font-size:12px; font-weight:600;
  transition:all var(--duration-fast);
}
.btn-add:hover { background:var(--accent-primary); color:var(--text-inverse); }

.ficha {
  background:var(--bg-card); border:1px solid var(--border-subtle);
  border-radius:var(--radius-lg); padding:18px 20px;
  margin-bottom:14px; transition:border-color var(--duration-base);
  animation:fadeIn var(--duration-slow) var(--ease-out);
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.ficha:hover { border-color:var(--border-default); }

.ficha-header {
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:12px; margin-bottom:14px;
}
.ficha-title {
  flex:1; font-size:16px; font-weight:600; letter-spacing:-0.01em;
  padding:4px 6px; border-radius:var(--radius-sm);
  border:1px solid transparent;
  outline:none; min-height:30px;
  white-space:pre-wrap; word-wrap:break-word;
}
.ficha-title:hover { border-color:var(--border-subtle); }
.ficha-title:focus { border-color:var(--accent-primary); background:var(--bg-elevated); box-shadow:0 0 0 3px var(--accent-primary-muted); }

.ficha-toolbar { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.ficha-toolbar button {
  width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  background:transparent; border:1px solid var(--border-subtle);
  color:var(--text-tertiary); border-radius:var(--radius-sm);
  cursor:pointer; font-size:12px; transition:all var(--duration-fast);
}
.ficha-toolbar button:hover { color:var(--text-primary); border-color:var(--border-default); background:var(--bg-hover); }
.ficha-toolbar .btn-danger:hover { color:var(--status-error); border-color:var(--status-error); }

.estado-pill {
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.04em; padding:4px 10px; border-radius:999px;
  cursor:pointer; border:1px solid transparent;
  transition:all var(--duration-fast);
}
.estado-pill.borrador { color:var(--status-warning); background:var(--status-warning-bg); border-color:rgba(245,158,11,0.25); }
.estado-pill.publicada { color:var(--status-success); background:var(--status-success-bg); border-color:rgba(34,197,94,0.25); }
.estado-pill.archivada { color:var(--text-tertiary); background:var(--bg-elevated); border-color:var(--border-default); }
.estado-pill:hover { filter:brightness(1.2); }

.bloques {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
  gap:14px;
}
.bloque { display:flex; flex-direction:column; gap:6px; }
.bloque-label {
  display:flex; align-items:center; gap:8px;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.08em; color:var(--text-tertiary);
}
.bloque-label .bullet { width:6px; height:6px; border-radius:50%; }
.bloque[data-field="unidad"]       .bullet { background:var(--accent-secondary); }
.bloque[data-field="alcance"]      .bullet { background:var(--accent-primary); }
.bloque[data-field="herramientas"] .bullet { background:var(--status-violet); }
.bloque[data-field="no_incluye"]   .bullet { background:var(--status-error); }
.bloque[data-field="flexibilidad"] .bullet { background:var(--status-warning); }

.bloque-content {
  background:var(--bg-elevated); border:1px solid var(--border-subtle);
  border-radius:var(--radius-md); padding:10px 12px;
  min-height:60px; font-size:13px; line-height:1.6; color:var(--text-primary);
  outline:none; white-space:pre-wrap; word-wrap:break-word;
  transition:all var(--duration-fast);
}
.bloque-content:hover { border-color:var(--border-default); }
.bloque-content:focus { border-color:var(--accent-primary); box-shadow:0 0 0 3px var(--accent-primary-muted); }
.bloque-content:empty::before { content:attr(data-placeholder); color:var(--text-tertiary); pointer-events:none; }

/* Popover de estado */
.popover {
  position:absolute; z-index:50;
  background:var(--bg-elevated); border:1px solid var(--border-default);
  border-radius:var(--radius-md); padding:6px;
  box-shadow:0 12px 32px rgba(0,0,0,0.4);
  animation:popIn 120ms var(--ease-out);
  min-width:140px;
}
@keyframes popIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.popover-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 10px; border-radius:var(--radius-sm);
  font-size:12px; cursor:pointer; color:var(--text-primary);
}
.popover-item:hover { background:var(--bg-hover); }
.popover-item .dot { width:8px; height:8px; border-radius:50%; }
.popover-item .dot.borrador  { background:var(--status-warning); }
.popover-item .dot.publicada { background:var(--status-success); }
.popover-item .dot.archivada { background:var(--text-tertiary); }

/* Empty / loading */
.loading {
  display:flex; align-items:center; justify-content:center;
  min-height:50vh; color:var(--text-tertiary); font-size:13px;
}
.empty-cat {
  padding:24px; text-align:center; color:var(--text-tertiary);
  font-size:13px; font-style:italic;
  background:var(--bg-card); border:1px dashed var(--border-default);
  border-radius:var(--radius-md);
}

/* ============================================
   LIGHT THEME
   ============================================ */
[data-theme="light"] {
  --bg-base:#f5f6f8; --bg-card:#ffffff; --bg-elevated:#ffffff;
  --bg-hover:#eef0f4; --bg-active:#e4e6ec;
  --border-subtle:#e4e6ec; --border-default:#d0d3dc; --border-strong:#a0a4b2;
  --text-primary:#111827; --text-secondary:#4b5563; --text-tertiary:#9ca3af; --text-inverse:#ffffff;
  --accent-primary:#16a34a; --accent-primary-hover:#15803d; --accent-primary-muted:rgba(22,163,74,0.10);
  --accent-secondary:#2563eb; --accent-secondary-hover:#1d4ed8; --accent-secondary-muted:rgba(37,99,235,0.10);
  --status-success:#16a34a; --status-success-bg:rgba(22,163,74,0.10);
  --status-warning:#d97706; --status-warning-bg:rgba(217,119,6,0.10);
  --status-error:#dc2626;   --status-error-bg:rgba(220,38,38,0.10);
  --status-info:#2563eb;    --status-info-bg:rgba(37,99,235,0.10);
  --status-neutral:#6b7280; --status-neutral-bg:rgba(107,114,128,0.10);
  --status-violet:#7c3aed;  --status-violet-bg:rgba(124,58,237,0.10);
}
[data-theme="light"] .topbar { background:rgba(245,246,248,0.92); }
[data-theme="light"] .bloque-content { background:var(--bg-base); }

/* Theme switch */
.theme-switch {
  display:inline-flex; align-items:center; gap:5px;
  height:30px; padding:0 10px;
  font-size:11px; font-weight:500; font-family:var(--font-ui);
  background:transparent; color:var(--text-secondary);
  border:1px solid var(--border-default); border-radius:999px;
  cursor:pointer; transition:all 120ms;
}
.theme-switch:hover { color:var(--text-primary); border-color:var(--border-strong); background:var(--bg-hover); }
.theme-switch svg { width:13px; height:13px; flex-shrink:0; }
[data-theme="light"] .theme-switch .icon-moon { display:none; }
.theme-switch .icon-sun { display:none; }
[data-theme="light"] .theme-switch .icon-sun { display:inline-block; }
.theme-switch .icon-moon { display:inline-block; }

/* View toggle */
.view-toggle {
  display:inline-flex; align-items:center; gap:2px;
  background:var(--bg-elevated); border:1px solid var(--border-default);
  border-radius:var(--radius-sm); padding:3px;
}
.view-toggle button {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border:none; border-radius:4px;
  font-size:11px; font-weight:500; font-family:var(--font-ui);
  color:var(--text-tertiary); background:transparent; cursor:pointer;
  transition:all var(--duration-fast);
}
.view-toggle button.active { background:var(--bg-active); color:var(--text-primary); }
.view-toggle button:hover:not(.active) { color:var(--text-secondary); background:var(--bg-hover); }
.view-toggle button svg { width:13px; height:13px; }

/* ============================================
   TABLE VIEW
   ============================================ */
.table-wrap { width:100%; overflow-x:auto; }
.fichas-table {
  width:100%; border-collapse:separate; border-spacing:0; font-size:13px;
}
.fichas-table th {
  position:sticky; top:64px; z-index:5;
  background:var(--bg-base); text-align:left;
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em;
  color:var(--text-tertiary); padding:8px 12px;
  border-bottom:2px solid var(--border-default);
  white-space:nowrap;
}
.fichas-table td {
  padding:6px 10px; vertical-align:top;
  border-bottom:1px solid var(--border-subtle);
  min-width:100px; max-width:220px;
}
.fichas-table td:first-child { min-width:180px; position:sticky; left:0; background:var(--bg-base); z-index:2; }
[data-theme="light"] .fichas-table td:first-child { background:var(--bg-base); }
.fichas-table tr.cat-row td {
  background:var(--bg-card); padding:10px 12px;
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
  color:var(--text-secondary); border-bottom:1px solid var(--border-default);
  position:sticky; left:0; white-space:nowrap;
}
.fichas-table tr.cat-row td .cat-bar {
  display:inline-block; width:3px; height:13px; border-radius:2px;
  margin-right:8px; vertical-align:middle;
}
.fichas-table tr:not(.cat-row):hover td { background:var(--bg-hover); }
.fichas-table tr:not(.cat-row):hover td:first-child { background:var(--bg-hover); }
.cell-edit {
  display:block; width:100%; min-height:32px; padding:4px 6px;
  border:1px solid transparent; border-radius:var(--radius-sm);
  outline:none; font-size:12px; line-height:1.5; color:var(--text-primary);
  font-family:var(--font-ui); white-space:pre-wrap; word-break:break-word;
  background:transparent; transition:border-color var(--duration-fast), background var(--duration-fast);
}
.cell-edit:hover { border-color:var(--border-subtle); background:var(--bg-elevated); }
.cell-edit:focus { border-color:var(--accent-primary); background:var(--bg-elevated); box-shadow:0 0 0 2px var(--accent-primary-muted); }
.cell-edit:empty::before { content:attr(data-placeholder); color:var(--text-tertiary); pointer-events:none; }
.cell-title { font-size:13px; font-weight:600; }

/* ============================================
   ADD CATEGORY FORM
   ============================================ */
.cat-add-btn {
  display:flex; align-items:center; gap:6px;
  width:100%; margin-top:8px; padding:7px 10px;
  background:transparent; color:var(--text-tertiary);
  border:1px dashed var(--border-default); border-radius:var(--radius-sm);
  font-size:12px; font-weight:500; font-family:var(--font-ui);
  cursor:pointer; transition:all var(--duration-fast);
}
.cat-add-btn:hover { color:var(--accent-primary); border-color:var(--accent-primary); }
.cat-form {
  margin-top:8px; padding:10px;
  background:var(--bg-elevated); border:1px solid var(--border-default);
  border-radius:var(--radius-md);
}
.cat-form input[type="text"] {
  width:100%; padding:7px 10px; margin-bottom:8px;
  background:var(--bg-base); border:1px solid var(--border-default);
  border-radius:var(--radius-sm); color:var(--text-primary);
  font-size:12px; font-family:var(--font-ui); outline:none;
}
.cat-form input[type="text"]:focus { border-color:var(--accent-primary); }

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = window.__SUPABASE_URL__;
const ANON = window.__SUPABASE_ANON_KEY__;
const STORAGE_KEY = "thenucleo-comunidad-auth";  // sesión compartida con /comunidad y /playbook

// Allowlist sincronizada con tabla comunidad_admins en Supabase (la RLS la valida en servidor).
const EDITOR_EMAILS = new Set([
  "benjamin.sanchis@thenucleo.com",
  "alejandro.lopez@thenucleo.com",
  "marketing.thenucleo@gmail.com",
  "mel.dalmazo@thenucleo.com",
]);

const SUPABASE = createClient(SUPABASE_URL, ANON, {
  auth: {
    persistSession:true, autoRefreshToken:true, detectSessionInUrl:true,
    storageKey:STORAGE_KEY,
    lock: async (_n,_t,fn) => fn(),
  }
});

// ============================================================
// SESSION (lectura desde localStorage para evitar GoTrueClient hang)
// ============================================================
function readStoredSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (s?.expires_at && s.expires_at * 1000 < Date.now()) return null;
    return s ?? null;
  } catch { return null; }
}
function currentUser() { return readStoredSession()?.user ?? null; }
function accessToken() { return readStoredSession()?.access_token ?? null; }
function isAdmin() {
  const u = currentUser();
  return !!(u && u.email && EDITOR_EMAILS.has(u.email.toLowerCase()));
}

// ============================================================
// STATE
// ============================================================
const STATE = {
  categorias: [],
  fichas: [],
  canEdit: false,
  view: 'cards',
};

// ============================================================
// GATE — anon o autenticado-no-admin
// ============================================================
function showGate(kind) {
  const gate = document.getElementById('gate');
  const title = document.getElementById('gate-title');
  const msg = document.getElementById('gate-msg');
  const btn = document.getElementById('gate-login');
  if (kind === 'no-admin') {
    title.textContent = 'Tu cuenta no tiene acceso';
    msg.textContent = `${currentUser()?.email || 'Tu cuenta'} no está en la allowlist del equipo. Si crees que es un error, contacta con Ben.`;
    btn.textContent = 'Cambiar de cuenta';
  } else {
    title.textContent = 'Acceso restringido';
    msg.textContent = 'Estas fichas son documentación interna del equipo TheNucleo. Inicia sesión con tu cuenta corporativa para acceder.';
    btn.textContent = 'Iniciar sesión';
  }
  gate.style.display = 'flex';
  document.documentElement.classList.add('locked-mode');
}
document.getElementById('gate-login').addEventListener('click', () => {
  if (currentUser()) {
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
  }
  const next = '/fichas-de-producto/';
  location.assign('/comunidad/entrar/?next=' + encodeURIComponent(next));
});

// ============================================================
// DATA — fetch con JWT del user (RLS valida)
// ============================================================
async function authFetch(path, opts = {}) {
  const token = accessToken();
  if (!token) throw new Error('no-session');
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...opts,
    headers: {
      apikey: ANON,
      Authorization: 'Bearer ' + token,
      'Content-Type': 'application/json',
      Accept: 'application/json',
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status}: ${text || res.statusText}`);
  }
  return res;
}

async function loadAll() {
  const [catsRes, fichasRes] = await Promise.all([
    authFetch('/fichas_categorias?select=*&order=orden.asc'),
    authFetch('/fichas_de_producto?select=*&order=categoria_id.asc,orden.asc'),
  ]);
  STATE.categorias = await catsRes.json();
  STATE.fichas = await fichasRes.json();
}

// ============================================================
// PERSISTENCIA — PATCH con debounce por (id, field)
// ============================================================
const saveTimers = new Map();   // key: id + ':' + field
const pendingPayloads = new Map();

function scheduleSave(id, field, value) {
  if (!STATE.canEdit) return;
  const key = `${id}:${field}`;
  if (saveTimers.has(key)) clearTimeout(saveTimers.get(key));
  pendingPayloads.set(key, value);
  setIndicator('saving');
  const t = setTimeout(() => flushSave(id, field), 500);
  saveTimers.set(key, t);
}

async function flushSave(id, field) {
  const key = `${id}:${field}`;
  const value = pendingPayloads.get(key);
  pendingPayloads.delete(key);
  saveTimers.delete(key);
  try {
    await authFetch(`/fichas_de_producto?id=eq.${id}`, {
      method: 'PATCH',
      headers: { Prefer: 'return=minimal' },
      body: JSON.stringify({ [field]: value }),
    });
    // actualizar STATE local
    const f = STATE.fichas.find(x => x.id === id);
    if (f) f[field] = value;
    if (saveTimers.size === 0) setIndicator('saved');
  } catch (e) {
    console.error('[fichas] save failed', e);
    setIndicator('error', e.message);
  }
}

let saveIndicatorTimer = null;
function setIndicator(kind, msg) {
  const el = document.getElementById('save-indicator');
  const label = document.getElementById('save-label');
  el.classList.remove('saving','saved','error');
  if (kind === 'saving') { el.classList.add('saving'); label.textContent = 'Guardando…'; }
  else if (kind === 'saved') {
    el.classList.add('saved'); label.textContent = 'Guardado';
    if (saveIndicatorTimer) clearTimeout(saveIndicatorTimer);
    saveIndicatorTimer = setTimeout(() => { el.classList.remove('saved'); label.textContent = 'Guardado'; }, 2000);
  }
  else if (kind === 'error') { el.classList.add('error'); label.textContent = msg ? `Error: ${msg.slice(0,40)}` : 'Error'; }
}

// ============================================================
// CRUD acciones — nueva ficha, borrar, reordenar
// ============================================================
async function createFicha(catId) {
  const cat = STATE.categorias.find(c => c.id === catId);
  if (!cat) return;
  const maxOrden = STATE.fichas.filter(f => f.categoria_id === catId).reduce((m,f) => Math.max(m, f.orden), 0);
  const titulo = 'Nueva ficha';
  const slug = 'nueva-ficha-' + Date.now();
  setIndicator('saving');
  try {
    const res = await authFetch('/fichas_de_producto', {
      method: 'POST',
      headers: { Prefer: 'return=representation' },
      body: JSON.stringify({
        categoria_id: catId, titulo, slug,
        orden: maxOrden + 1, estado: 'borrador',
      }),
    });
    const rows = await res.json();
    STATE.fichas.push(rows[0]);
    setIndicator('saved');
    renderAll();
    // foco en el título de la nueva
    setTimeout(() => {
      const node = document.querySelector(`.ficha[data-id="${rows[0].id}"] .ficha-title`);
      if (node) { node.focus(); document.getSelection()?.selectAllChildren(node); }
    }, 50);
  } catch (e) {
    console.error('[fichas] create failed', e);
    setIndicator('error', e.message);
  }
}

async function deleteFicha(id) {
  if (!confirm('¿Borrar esta ficha? No se puede deshacer.')) return;
  setIndicator('saving');
  try {
    await authFetch(`/fichas_de_producto?id=eq.${id}`, { method: 'DELETE' });
    STATE.fichas = STATE.fichas.filter(f => f.id !== id);
    setIndicator('saved');
    renderAll();
  } catch (e) {
    console.error('[fichas] delete failed', e);
    setIndicator('error', e.message);
  }
}

async function moveFicha(id, dir) {
  const f = STATE.fichas.find(x => x.id === id);
  if (!f) return;
  const siblings = STATE.fichas.filter(x => x.categoria_id === f.categoria_id).sort((a,b) => a.orden - b.orden);
  const idx = siblings.findIndex(x => x.id === id);
  const targetIdx = idx + dir;
  if (targetIdx < 0 || targetIdx >= siblings.length) return;
  const target = siblings[targetIdx];
  const [a, b] = [f.orden, target.orden];
  // swap optimista local
  f.orden = b; target.orden = a;
  renderAll();
  // persistir en serie (no batch — UPDATE individual con RLS)
  try {
    await authFetch(`/fichas_de_producto?id=eq.${f.id}`, { method:'PATCH', headers:{Prefer:'return=minimal'}, body: JSON.stringify({orden: b}) });
    await authFetch(`/fichas_de_producto?id=eq.${target.id}`, { method:'PATCH', headers:{Prefer:'return=minimal'}, body: JSON.stringify({orden: a}) });
    setIndicator('saved');
  } catch (e) {
    f.orden = a; target.orden = b; renderAll();
    setIndicator('error', e.message);
  }
}

async function changeEstado(id, nuevoEstado) {
  const f = STATE.fichas.find(x => x.id === id);
  if (!f) return;
  const prev = f.estado;
  f.estado = nuevoEstado;
  renderAll();
  setIndicator('saving');
  try {
    await authFetch(`/fichas_de_producto?id=eq.${id}`, {
      method:'PATCH', headers:{Prefer:'return=minimal'},
      body: JSON.stringify({estado: nuevoEstado}),
    });
    setIndicator('saved');
  } catch (e) {
    f.estado = prev; renderAll();
    setIndicator('error', e.message);
  }
}

// ============================================================
// RENDER
// ============================================================
const FIELDS = [
  { key:'unidad',       label:'Unidad de servicio',         placeholder:'¿Qué cuenta como "1" de este servicio?' },
  { key:'alcance',      label:'Alcance',                    placeholder:'¿Qué incluye exactamente?' },
  { key:'herramientas', label:'Herramientas y cómo se usan', placeholder:'¿Qué herramienta para qué?' },
  { key:'no_incluye',   label:'Lo que NO incluye',          placeholder:'Frontera explícita' },
  { key:'flexibilidad', label:'Dónde hay flexibilidad',     placeholder:'¿Qué decide el ejecutor, qué se escala?' },
];

function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderSidebar() {
  const list = document.getElementById('cat-list');
  list.innerHTML = STATE.categorias.map(c => {
    const count = STATE.fichas.filter(f => f.categoria_id === c.id).length;
    return `<div class="cat-link" data-cat="${c.id}">
      <span class="cat-dot" style="background:${c.color || '#888'}"></span>
      <span class="cat-name">${escapeHtml(c.nombre)}</span>
      <span class="cat-count">${count}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.cat-link').forEach(node => {
    node.addEventListener('click', () => {
      const el = document.getElementById('cat-' + node.dataset.cat);
      if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
    });
  });
}

function renderMain() {
  if (STATE.view === 'table') { renderTable(); return; }
  const main = document.getElementById('main');
  if (!STATE.categorias.length) {
    main.innerHTML = '<div class="empty-cat">No hay categorías cargadas.</div>';
    return;
  }
  const html = STATE.categorias.map(cat => {
    const fichasCat = STATE.fichas
      .filter(f => f.categoria_id === cat.id)
      .sort((a,b) => a.orden - b.orden);
    const fichasHtml = fichasCat.length
      ? fichasCat.map(f => renderFicha(f)).join('')
      : '<div class="empty-cat">Sin fichas todavía. Pulsa "+ Nueva ficha" para crear la primera.</div>';
    return `
      <section class="category-block" id="cat-${cat.id}" data-cat="${cat.id}">
        <div class="category-header">
          <div class="category-header-left">
            <span class="category-bar" style="background:${cat.color || '#888'}"></span>
            <h2>${escapeHtml(cat.nombre)}</h2>
          </div>
          ${STATE.canEdit ? `<button class="btn-add" data-action="add-ficha" data-cat="${cat.id}">+ Nueva ficha</button>` : ''}
        </div>
        ${fichasHtml}
      </section>
    `;
  }).join('');
  main.innerHTML = html;
  attachEditableHandlers();
  attachToolbarHandlers();
}

function renderTable() {
  const main = document.getElementById('main');
  if (!STATE.categorias.length) {
    main.innerHTML = '<div class="empty-cat">No hay categorías cargadas.</div>';
    return;
  }
  const cols = [
    { key:'titulo',       label:'Nombre',                    placeholder:'Nombre' },
    { key:'estado',       label:'Estado' },
    { key:'unidad',       label:'Unidad de servicio',        placeholder:'¿Qué cuenta como "1"?' },
    { key:'alcance',      label:'Alcance',                   placeholder:'¿Qué incluye exactamente?' },
    { key:'herramientas', label:'Herramientas',              placeholder:'¿Qué herramienta para qué?' },
    { key:'no_incluye',   label:'No incluye',                placeholder:'Frontera explícita' },
    { key:'flexibilidad', label:'Flexibilidad',              placeholder:'¿Qué decide el ejecutor?' },
  ];
  const editable = STATE.canEdit ? 'contenteditable="plaintext-only"' : '';
  let rows = '';
  STATE.categorias.forEach(cat => {
    const fichasCat = STATE.fichas.filter(f => f.categoria_id === cat.id).sort((a,b) => a.orden - b.orden);
    rows += `<tr class="cat-row"><td colspan="${cols.length}"><span class="cat-bar" style="background:${cat.color||'#888'}"></span>${escapeHtml(cat.nombre)} <span style="color:var(--text-tertiary);font-weight:400;">(${fichasCat.length})</span>${STATE.canEdit ? `&ensp;<button class="btn-add" style="padding:3px 10px;font-size:11px;" data-action="add-ficha" data-cat="${cat.id}">+ ficha</button>` : ''}</td></tr>`;
    if (!fichasCat.length) {
      rows += `<tr><td colspan="${cols.length}" style="padding:10px 12px;color:var(--text-tertiary);font-style:italic;font-size:12px;">Sin fichas todavía.</td></tr>`;
    } else {
      fichasCat.forEach(f => {
        const cells = cols.map(col => {
          if (col.key === 'estado') {
            const edAct = STATE.canEdit ? `data-action="toggle-estado" data-id="${f.id}"` : '';
            return `<td><span class="estado-pill ${f.estado}" ${edAct} style="cursor:${STATE.canEdit?'pointer':'default'}">${f.estado}</span></td>`;
          }
          return `<td><div class="cell-edit${col.key==='titulo'?' cell-title':''}" ${editable} data-id="${f.id}" data-field="${col.key}" data-placeholder="${escapeHtml(col.placeholder||'')}">${escapeHtml(f[col.key]||'')}</div></td>`;
        }).join('');
        rows += `<tr data-id="${f.id}">${cells}</tr>`;
      });
    }
  });
  main.innerHTML = `
    <div class="table-wrap">
      <table class="fichas-table">
        <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  attachEditableHandlers();
  attachToolbarHandlers();
}

function renderFicha(f) {
  const editable = STATE.canEdit ? 'contenteditable="plaintext-only"' : '';
  const bloques = FIELDS.map(field => `
    <div class="bloque" data-field="${field.key}">
      <div class="bloque-label"><span class="bullet"></span>${field.label}</div>
      <div class="bloque-content" ${editable}
           data-id="${f.id}" data-field="${field.key}"
           data-placeholder="${escapeHtml(field.placeholder)}">${escapeHtml(f[field.key] || '')}</div>
    </div>
  `).join('');

  const toolbar = STATE.canEdit ? `
    <div class="ficha-toolbar">
      <span class="estado-pill ${f.estado}" data-action="toggle-estado" data-id="${f.id}">${f.estado}</span>
      <button data-action="move-up" data-id="${f.id}" title="Subir">↑</button>
      <button data-action="move-down" data-id="${f.id}" title="Bajar">↓</button>
      <button class="btn-danger" data-action="delete" data-id="${f.id}" title="Borrar">✕</button>
    </div>
  ` : `<div class="ficha-toolbar"><span class="estado-pill ${f.estado}">${f.estado}</span></div>`;

  return `
    <article class="ficha" data-id="${f.id}">
      <div class="ficha-header">
        <div class="ficha-title" ${editable} data-id="${f.id}" data-field="titulo">${escapeHtml(f.titulo)}</div>
        ${toolbar}
      </div>
      <div class="bloques">${bloques}</div>
    </article>
  `;
}

function attachEditableHandlers() {
  if (!STATE.canEdit) return;
  document.querySelectorAll('[contenteditable]').forEach(node => {
    let initialValue = node.textContent;
    node.addEventListener('focus', () => { initialValue = node.textContent; });
    node.addEventListener('blur', () => {
      const value = node.textContent;
      if (value === initialValue) return;
      const id = node.dataset.id;
      const field = node.dataset.field;
      scheduleSave(id, field, value);
    });
    // guardado mientras escribe (debounced)
    node.addEventListener('input', () => {
      const value = node.textContent;
      const id = node.dataset.id;
      const field = node.dataset.field;
      scheduleSave(id, field, value);
    });
  });
}

function attachToolbarHandlers() {
  if (!STATE.canEdit) return;
  document.querySelectorAll('[data-action]').forEach(node => {
    const action = node.dataset.action;
    if (action === 'add-ficha') node.addEventListener('click', () => createFicha(node.dataset.cat));
    else if (action === 'delete') node.addEventListener('click', () => deleteFicha(node.dataset.id));
    else if (action === 'move-up') node.addEventListener('click', () => moveFicha(node.dataset.id, -1));
    else if (action === 'move-down') node.addEventListener('click', () => moveFicha(node.dataset.id, +1));
    else if (action === 'toggle-estado') node.addEventListener('click', e => openEstadoPicker(e, node.dataset.id));
  });
}

function openEstadoPicker(evt, id) {
  evt.stopPropagation();
  closeAllPopovers();
  const r = evt.target.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'popover';
  pop.style.left = (r.left + window.scrollX) + 'px';
  pop.style.top = (r.bottom + window.scrollY + 6) + 'px';
  pop.innerHTML = ['borrador','publicada','archivada'].map(e =>
    `<div class="popover-item" data-estado="${e}"><span class="dot ${e}"></span>${e}</div>`
  ).join('');
  document.body.appendChild(pop);
  pop.querySelectorAll('.popover-item').forEach(item => {
    item.addEventListener('click', () => {
      changeEstado(id, item.dataset.estado);
      closeAllPopovers();
    });
  });
  setTimeout(() => document.addEventListener('click', closeAllPopovers, { once: true }), 0);
}
function closeAllPopovers() {
  document.querySelectorAll('.popover').forEach(p => p.remove());
}

function renderAll() {
  renderSidebar();
  renderMain();
  renderCatAddUI();
}

// ============================================================
// ADD CATEGORY
// ============================================================
const CAT_COLORS = ['#22c55e','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#a3a3a3'];
let _catFormOpen = false;
let _catFormColor = CAT_COLORS[0];

function renderCatAddUI() {
  const container = document.getElementById('cat-add-container');
  if (!container || !STATE.canEdit) { if (container) container.innerHTML = ''; return; }
  if (!_catFormOpen) {
    container.innerHTML = `<button class="cat-add-btn" id="cat-add-btn">＋ Nueva categoría</button>`;
    document.getElementById('cat-add-btn').addEventListener('click', () => { _catFormOpen = true; renderCatAddUI(); });
    return;
  }
  const swatches = CAT_COLORS.map(c =>
    `<span class="cat-color-swatch${c===_catFormColor?' selected':''}" data-color="${c}" style="background:${c}" title="${c}"></span>`
  ).join('');
  container.innerHTML = `
    <div class="cat-form">
      <input type="text" id="cat-name-input" placeholder="Nombre de la categoría" autocomplete="off" maxlength="60">
      <div class="cat-colors">${swatches}</div>
      <div class="cat-form-actions">
        <button class="btn-save" id="cat-save-btn">Guardar</button>
        <button class="btn-cancel" id="cat-cancel-btn">Cancelar</button>
      </div>
    </div>`;
  container.querySelectorAll('.cat-color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      _catFormColor = sw.dataset.color;
      container.querySelectorAll('.cat-color-swatch').forEach(s => s.classList.toggle('selected', s === sw));
    });
  });
  document.getElementById('cat-cancel-btn').addEventListener('click', () => {
    _catFormOpen = false; _catFormColor = CAT_COLORS[0]; renderCatAddUI();
  });
  document.getElementById('cat-save-btn').addEventListener('click', async () => {
    const nombre = (document.getElementById('cat-name-input')?.value || '').trim();
    if (!nombre) { document.getElementById('cat-name-input')?.focus(); return; }
    await createCategoria(nombre, _catFormColor);
    _catFormOpen = false; _catFormColor = CAT_COLORS[0]; renderCatAddUI();
  });
  document.getElementById('cat-name-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('cat-save-btn')?.click();
    if (e.key === 'Escape') document.getElementById('cat-cancel-btn')?.click();
  });
  setTimeout(() => document.getElementById('cat-name-input')?.focus(), 30);
}

async function createCategoria(nombre, color) {
  const maxOrden = STATE.categorias.reduce((m, c) => Math.max(m, c.orden || 0), 0);
  setIndicator('saving');
  try {
    const res = await authFetch('/fichas_categorias', {
      method: 'POST',
      headers: { Prefer: 'return=representation' },
      body: JSON.stringify({ nombre, color, orden: maxOrden + 1 }),
    });
    const rows = await res.json();
    STATE.categorias.push(rows[0]);
    setIndicator('saved');
    renderAll();
  } catch (e) {
    console.error('[fichas] create cat failed', e);
    setIndicator('error', e.message);
  }
}

// ============================================================
// NAV DROPDOWN
// ============================================================
(function initNavDropdown() {
  const navBtn = document.getElementById('nav-user-btn');
  const navDropdown = document.getElementById('nav-user-dropdown');
  if (!navBtn || !navDropdown) return;
  navBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = navDropdown.style.display !== 'none';
    navDropdown.style.display = isOpen ? 'none' : 'block';
    navBtn.setAttribute('aria-expanded', String(!isOpen));
  });
  document.addEventListener('click', () => {
    navDropdown.style.display = 'none';
    navBtn.setAttribute('aria-expanded', 'false');
  });
})();

// ============================================================
// USER PILL
// ============================================================
function renderUserUI() {
  const u = currentUser();
  if (!u) return;
  document.getElementById('nav-user-wrap').style.display = '';
  document.getElementById('user-pill').style.display = '';
  document.getElementById('btn-logout').style.display = '';
  document.getElementById('user-name').textContent = u.email;
  document.getElementById('user-avatar').textContent = (u.email[0] || '?').toUpperCase();
}
document.getElementById('btn-logout').addEventListener('click', async () => {
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
  SUPABASE.auth.signOut().catch(() => {});
  location.assign('/comunidad/entrar/?next=' + encodeURIComponent('/fichas-de-producto/'));
});

// ============================================================
// THEME
// ============================================================
const THEME_KEY = 'thenucleo-fichas-theme';
(function initTheme() {
  try { document.documentElement.dataset.theme = localStorage.getItem(THEME_KEY) || 'dark'; }
  catch { document.documentElement.dataset.theme = 'dark'; }
})();
document.getElementById('btn-theme').addEventListener('click', () => {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  try { localStorage.setItem(THEME_KEY, t); } catch {}
});

// ============================================================
// VIEW TOGGLE
// ============================================================
document.querySelectorAll('#view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    STATE.view = btn.dataset.view;
    document.querySelectorAll('#view-toggle button').forEach(b => b.classList.toggle('active', b === btn));
    renderMain();
  });
});

// ============================================================
// BOOTSTRAP
// ============================================================
(async function init() {
  const u = currentUser();
  if (!u) { showGate('anon'); return; }
  if (!isAdmin()) { showGate('no-admin'); return; }

  STATE.canEdit = true;
  document.body.classList.remove('viewer');
  document.body.classList.add('editor');

  renderUserUI();
  document.documentElement.classList.remove('locked-mode');

  try {
    await loadAll();
    document.getElementById('loading').remove();
    renderAll();
  } catch (e) {
    console.error('[fichas] load failed', e);
    document.getElementById('main').innerHTML =
      `<div class="empty-cat">Error cargando fichas: ${escapeHtml(e.message)}</div>`;
  }
})();
</script>
</body>
</html>
